name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - feature/**

jobs:
  validate:
    name: Test, Typecheck, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26.4.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests - messages
        run: node scripts/run-ci-test.mjs src/shared/messages.test.ts

      - name: Unit tests - rules
        run: node scripts/run-ci-test.mjs src/core/rules.test.ts

      - name: Unit tests - locale recommendation
        run: node scripts/run-ci-test.mjs src/core/locale-recommendation.test.ts

      - name: Unit tests - settings editor
        run: node scripts/run-ci-test.mjs src/options/settings-editor.test.ts

      - name: Unit tests - IP checker
        run: node scripts/run-ci-test.mjs src/ip-check/checker.test.ts

      - name: Unit tests - IP providers
        run: node scripts/run-ci-test.mjs src/ip-check/providers.test.ts

      - name: Unit tests - locale spoofing
        run: node scripts/run-ci-test.mjs src/content/locale-spoofing.test.ts

      - name: Unit tests - storage
        run: node scripts/run-ci-test.mjs src/storage/settings.test.ts

      - name: Typecheck
        run: pnpm typecheck

      - name: Build Chrome extension
        run: pnpm build:chrome

      - name: Build Firefox extension
        run: pnpm build:firefox

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser smoke test
        run: pnpm e2e:smoke
